name: Daily signals refresh

on:
  # Planifié : 15:00 UTC, jours de Bourse US (lundi-vendredi).
  # Pourquoi 15:00 UTC ?  16:00 CET en hiver = UTC+1 = 15:00 UTC.
  # ⚠️ Le cron GitHub Actions s'exécute toujours en UTC, et le fuseau
  # Europe/Paris passe en UTC+1 (CET) en hiver et UTC+2 (CEST) en été :
  #   • hiver (≈ fin oct → fin mars) : 15:00 UTC = 16:00 CET  ✅ (l'heure demandée)
  #   • été   (≈ fin mars → fin oct) : 15:00 UTC = 17:00 CEST (1h plus tard)
  # Aucun déclencheur manuel : personne (ni visiteurs, ni propriétaire)
  # ne peut lancer ce pipeline depuis l'UI GitHub Actions. Le seul moment
  # où signals.json change, c'est la nuit suivante, à 16:00 CET (hiver).
  schedule:
    - cron: "0 15 * * 1-5"

permissions:
  contents: write   # nécessaire pour le commit automatique

jobs:
  build-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Récupération du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installation dépendances
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy scipy

      - name: Génération signals.json
        run: |
          set -euo pipefail
          ls -la
          echo "---- début pipeline ----"
          python generate_signals.py
          echo "---- fin pipeline ----"

      - name: Validation du JSON produit
        run: |
          python - <<'PY'
          import json, sys
          with open('signals.json') as f:
              d = json.load(f)
          assert d.get('schema_version') == 3,                f"schema_version != 3 ({d.get('schema_version')})"
          n = len(d.get('tickers', {}))
          exp = d.get('config', {}).get('universe_size', 69)
          assert n == exp,                                    f"tickers {n} != attendu {exp}"
          assert n >= 60,                                     f"trop peu de tickers : {n}"
          active = sum(1 for v in d['tickers'].values() if v.get('signal'))
          near   = len(d.get('near_signals', []))
          print(f"OK : {n} tickers, {active} actifs, {near} proches, {len(d.get('past_signals', []))} trades stockés")
          PY

      - name: Commit & push auto de signals.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Seuls les changements de signals.json déclenchent un commit, jamais le dashboard.
          if git diff --quiet HEAD -- signals.json; then
            echo "Aucune modification de signals.json → pas de commit."
          else
            git add signals.json
            STAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "màj signals.json ($STAMP)"
            git push
            echo "✅ signals.json poussé sur origin/main"
          fi
