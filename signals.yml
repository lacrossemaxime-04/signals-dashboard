name: Signals
on:
  schedule:
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install yfinance pandas numpy scipy
      - run: python generate_signals.py
      - run: |
          python -c "import json; d=json.load(open('signals.json')); assert d['schema_version']==3; assert len(d['tickers'])>=60"
      - run: |
          git config user.email "bot@users.noreply.github.com"
          git config user.name "bot"
          git add signals.json
          git commit -m "maj signals" || echo "nothing to commit"
          git push
